name: nuvia
description: Nuvia - Tu compañera de bienestar menstrual
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP y estado
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI
  cupertino_icons: ^1.0.6
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
